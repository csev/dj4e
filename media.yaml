    description: |
      The Django auto-grader is a PHP-based tool that evaluates student assignments by sending HTTP requests to the deployed application and checking HTML responses for required strings.

      It utilizes Learning Tools Interoperability (LTI) to send grades to learning management systems and performs up to 50 HTTP request-response cycles to validate the application.
  lesson-03-install/03-DJ-01-Hosting-01-1080.mov:
    title: DJ 03.03 The Structure of a Django Application (7:04)
    youtube_id: jmX27FrCqqs
    kaltura_id: null
    size: 360052905
    md5: a0238756779742226515fc3a8fa8a38e
    duration: 424
    duration_text: 07:04
    description: |
      This lecture covers the fundamental structure of a Django project, distinguishing between projects and applications. A project serves as a website and contains project-wide configuration files including settings.py, urls.py, and wsgi.py. Applications, which can be shared across projects, include files such as models.py, views.py, admin.py, forms.py, and templates.

      The request-response cycle in Django involves routing incoming requests via urls.py to the appropriate view in views.py. The view handles the request, may interact with models.py for data storage, and then renders a template to produce a response. This workflow follows the model-view-controller pattern terminology used for clarity in application development.
  lesson-03-install/04-paw_install_errors_52.m4v:
    title: DJ 03.04 Fixing Django 5.2 Errors on PythonAnywhere (19:39)
    youtube_id: IYH_BkpHf3s
    kaltura_id: null
    size: 543135960
    md5: af93e420b0815fdd9c7e1fafc71f5e64
    duration: 1178
    duration_text: 19:38
    description: |
      The lecture demonstrates debugging common errors in Django applications hosted on Python Anywhere. It specifically covers startup failures where the application won't start at all, and traceback errors that occur after the application loads but fails during a request. For startup failures, the solution involves checking the virtual environment and working directory using the `python manage.py check` command to identify configuration issues before they prevent application startup.

      The transcript provides a step-by-step walkthrough of diagnosing a startup failure by running `python manage.py check` in the bash console, identifying the error in the code (such as a typo in an import statement), and fixing the issue. It also illustrates how to interpret traceback errors, which indicate that the application is running but fails during a specific request, often due to code errors in views.py or template files. The lecture emphasizes the importance of using the `manage.py check` tool to catch errors before they manifest as full startup failures and the role of the virtual environment in managing Django dependencies.
  lesson-04-shell/01-01_paw_shell.m4v:
    title: DJ 04.01 Using the Command Line Shell on PythonAnywhere (5.2) (18.28)
