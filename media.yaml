    md5: 97a8a9ef2d2f53a1cd22e97f291c634c
    duration: 353
    duration_text: 05:53
    description: |
      This lecture examines HTML's historical development from its 1990s origins at CERN to modern web standards. It covers early browser implementations like NCSA Mosaic that enabled cross-platform web access, and the initial limitations of HTML such as the absence of inline images and basic link styling with gray backgrounds and blue text. The discussion highlights how early HTML prioritized basic functionality over visual presentation.

      The lecture explains the shift toward standardized HTML through the World Wide Web Consortium (W3C) from 1994 to 1999, which established rules for lowercase tags, attribute quoting, and proper tag closure. Modern HTML requires precise syntax to ensure predictable rendering across browsers, avoiding inconsistent behaviors like quirks mode that occurred in earlier inconsistent implementations.
  lesson-05-html/02-Web-02-HTML-B.m4v:
    title: DJ 05.02 HTML - HyperText Markup Language (Part 2) (13:52)
    youtube_id: fh3omoEiebQ
    kaltura_id: null
    size: 736221114
    md5: 0f08651f557381879c8dd52f02299dcd
    duration: 833
    duration_text: 13:53
    description: |
      The lecture covers the foundational structure of an HTML document, including the doctype declaration, the <html> root element, the <head> section for metadata and non-printing content, and the <body> section for visible page content. It emphasizes that the <head> contains elements such as the page title, styling information, and scripts, while the <body> holds the actual content that users see.

      The lecture details basic HTML tags and their attributes, including hyperlinks (using the <a> tag with href attributes), image tags, and unordered lists (with <ul> and <li> tags). It also explains HTML special characters and their entity representations (e.g., &lt; for less than), the use of HTML comments, and the distinction between absolute and relative links for resource references, as well as the web server's default file naming conventions (e.g., index.html).
  lesson-05-html/03-Web-02-HTML-Code.m4v:
    title: DJ 05.03 Code Walk Through HTML (13:34)
    youtube_id: wYc6l28v7Cs
    kaltura_id: null
    size: 315268951
    md5: b3b074ea3592fd41817dbcd0754005f4
    duration: 814
    duration_text: 13:34
    description: |
      This lecture demonstrates the difference between HTML source code and the Document Object Model (DOM) in web development. It shows how the browser parses HTML files to create a structured DOM representation that is distinct from the original source code.

      The session covers practical examples including the pre tag, lists, tables, relative links, target attributes, and special characters. It explains how the DOM dynamically changes without altering the source code and how the browser automatically corrects minor HTML errors to form a valid DOM representation.
  lesson-06-css/01-Web-02-CSS-A.m4v:
