      This lecture demonstrates basic SQLite command line operations for file-based databases. It includes creating a table, inserting records, selecting data, updating rows, and deleting entries.

      The session highlights the necessity of WHERE clauses in update and delete statements to target specific records, as omitting them affects all rows. It also explains how SQLite handles empty result sets without errors.
  lesson-08-models/01-DJ-02-Models.m4v:
    title: DJ 08.01 Introduction to Django Models (19:59)
    youtube_id: AqsPifp-ccc
    kaltura_id: null
    size: 676198456
    md5: 5db52885718a7f74cf4907436dec2019
    duration: 1199
    duration_text: 19:59
    description: |
      Django models are Python classes defined in an application's models.py file that map to database tables. These classes extend Django's Model class to define fields such as CharField with a maximum length, enabling the creation of database tables through migrations.

      Django migrations create and evolve database schemas across different databases (e.g., SQLite, Postgres, MySQL). The process involves generating migration files via `make migrations` and applying them with `migrate`, ensuring database portability by handling database-specific syntax differences.
  lesson-08-models/02-DJ-02-Models-Migrate-From-03.m4v:
    title: DJ 08.02 Data Model Migration in Django (7:54)
    youtube_id: YqARGlI6bGc
    kaltura_id: null
    size: 295128059
    md5: 1a5c66a44d35d200b73c62b52d7d7e52
    duration: 474
    duration_text: 07:54
    description: |
      Django migrations are Python-based files generated by `make migrations` that describe incremental database schema changes. These files are portable across database types like SQLite and MySQL, and follow a versioned sequence starting from 001_initial.py. Each migration file represents the evolution from previous models.py definitions without wiping existing databases.

      The `migrate` command applies these migration files in order to update the database schema, tracking applied migrations in a Django Migrations table. In SQLite environments, the database can be reset by deleting the SQLite file (e.g., `rm db.sqlite`), though this requires recreating admin accounts and data.
  lesson-08-models/03-04_paw_models.m4v:
