    duration: 394
    duration_text: 06:34
    tags: network sockets, TCP port, IP address, IPv4, IPv6, HTTP, HTTPS
    description: |
      Network sockets provide a communication abstraction for computers that operates on a connect-talk-disconnect model, originating from 1960s design principles to enable scalable data sharing without permanent connections. This approach uses IP addresses and port numbers to route communication between applications, allowing billions of devices to interact efficiently without requiring continuous data access.

      Each computer has a unique IP address (either IPv4 or IPv6) and applications use port numbers to specify services, such as port 25 for email, port 23 for Telnet, port 80 for HTTP, and port 443 for HTTPS. These port numbers act as extensions to IP addresses, directing traffic to the correct application without conflicts while maintaining the client-server communication pattern.
  lesson-02-http/03-Web-01-HTTP-03-HTTP.m4v:
    title: 'DJ 02.03 History of HTTP and URL Structure (16:28)'
    youtube_id: Q5YIrYkrVXg
    kaltura_id: null
    size: 868953263
    md5: b1dfc3195151772bf59e708a0f7102c1
    duration: 988
    duration_text: 16:28
    tags: HTTP, URL, RFC, IETF, HTTP request, HTTP response, status code
    description: |
      Hypertext Transfer Protocol (HTTP) was invented in 1990 by Tim Berners-Lee and Robert Caillou at CERN. It serves as a simple protocol for browsers to communicate with servers and retrieve documents and images. The Uniform Resource Locator (URL) structure includes a protocol, a host (domain name), and a document path, with domain names resolving to IP addresses.

      HTTP uses a request-response mechanism where a client sends a request to a server, which responds with a status code and the requested resource. The status code (e.g., 200 OK or 404 Not Found) indicates the outcome of the request, and the response contains headers and the resource data. The protocol is standardized through Request for Comments (RFCs) by the Internet Engineering Task Force (IETF).
