    description: |
      This lecture describes Django's request-response cycle and the hierarchical project structure, including settings.py and applications.

      Requests are routed through project-level URLs to application views, which return responses to the browser using templates.
  lesson-02-http/08-Web-04-Mini-Django.m4v:
    title: DJ 02.08 Exploring the Mini Django Web Server (36:58)
    youtube_id: q6LGpiVPwaA
    kaltura_id: null
    size: 835841221
    md5: def458f93c42ad8b395c4a76dd340948
    duration: 2219
    duration_text: 36:59
    description: |
      Mini Django is a minimal implementation of the Django web framework, under 200 lines of Python code. It is designed to be readable and understandable for learners to grasp the core HTTP routing and view handling concepts.

      The framework processes HTTP requests by parsing the request, routing to a view function via a simple if-else pattern in urls.py, and returning HTTP responses with headers and body data.
  lesson-02-http/09-DJ-01-Hosting-02-1080.mov:
    title: DJ 02.09 Virtual Hosting of Django Applications (4:31)
    youtube_id: KA5ZM3E9OjY
    kaltura_id: null
    size: 246488741
    md5: 34db47320ed4fa0ab842b1e559ccccaf
    duration: 271
    duration_text: 04:31
    description: |
      Virtual hosting enables multiple domain names to operate on a single server instance by using the domain name specified in HTTP requests to route traffic to the correct application. This technique allows organizations like PythonAnywhere to manage numerous websites using minimal hardware resources while maintaining isolation between different domains.

      The system relies on configuration files, such as PythonAnywhere's WGSI file, which define application directories and routing rules. NGINX acts as the front-end server to direct incoming HTTP requests to the appropriate application instance based on the domain name in the request, ensuring each application runs independently within the shared infrastructure.
  lesson-03-install/01-paw_install52_new.m4v:
    title: DJ 03.01 Installing Django 5.2 on PythonAnywhere (31:59)
    youtube_id: Aba5ZCfua8k
    kaltura_id: null
    size: 894692080
    md5: c08f5987579475723ac5ef6461cf5997
    duration: 1918
    duration_text: 31:58
    description: |
      The lecture provides a step-by-step guide for setting up Django 5.2 on Python Anywhere. It covers creating a virtual environment using Python 3.13, activating it, upgrading pip, and installing Django. The process includes verifying the installation with `python manage.py check` and initializing a sample project.

      The lecture then details configuring Python Anywhere's web service to link the Django application to the domain by specifying the source code directory, working directory, and virtual environment. It concludes with creating a basic "polls" application and setting up URL routing and views.
  lesson-03-install/02-DJ-00-AutoGrader.m4v:
