    description: |
      The lecture covers core CSS concepts including font handling with default and custom fonts (using fallbacks), color specifications via HTML color names and hexadecimal codes, and anchor tag states (unvisited, visited, hover, active).

      This presentation details the CSS box model (content, padding, border, margin), positioning techniques (relative, absolute, fixed), z-index for overlapping elements, image floats, overflow handling (including hidden), and a navigation bar implementation using absolute positioning and class-based styling.
  lesson-07-sql/01-SQL-01-Basic-01.m4v:
    title: DJ 07.01 How Databases Work (18:57)
    youtube_id: C1QXYMNTEVs
    kaltura_id: null
    size: 837093031
    md5: 57c079a6bd957d1d06b6ba79f65d001c
    duration: 1137
    duration_text: 18:57
    description: |
      The lecture covers the historical context of database systems, starting with tape-based storage in the 1950s-1960s that required sequential access and hours of nightly processing for banks. This was followed by the introduction of disk drives in the 1970s, which improved access speed but necessitated research into storage optimization.

      The US National Institute of Standards and Technology (NIST) established SQL as a standard to prevent vendor lock-in, allowing databases to be interchanged without code rewriting. SQL abstracts physical storage details, enabling the definition of a schema that specifies data structure and types, which allows database engines to optimize storage and efficiently perform CRUD operations.
  lesson-07-sql/02-SQL-01-Basic-02.m4v:
