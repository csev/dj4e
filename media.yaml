    description: |
      This lecture introduces the "Django for Everybody" course, explaining Charles Severance's decision to use Django for students who already know Python. The choice was made after comparing Django and Flask, with Django providing a clear learning path for building functional web applications without excessive low-level complexity.

      The course teaches object oriented programming through Django, covering features including Ajax, image handling, OAuth authentication, and Bootstrap. Students host their projects on Python Anywhere from the first week, resulting in a complete, functional website by the end of the course.
  lesson-01-welcome/02-2025-08-20-AI.m4v:
    title: DJ 01.02 Thoughts on the use of Artificial Intelligence in Programming Courses (16:16)
    youtube_id: 1u-gQ-d5Lv8
    kaltura_id: null
    size: 1223876861
    md5: 266f968a0c66ee208a9204a94f4d071e
    duration: 976
    duration_text: 16:16
    description: |
      Charles Severance, a professor at the University of Michigan, explains that the early part of programming courses is particularly perilous if students rely on AI without learning the fundamentals. This can result in wasted time and money, as students may not gain any knowledge from the course.

      Severance details his course design strategies to counteract AI dependency, including assignments that require synthesizing concepts from multiple course materials, cumulative exams that test knowledge across weeks, and autograders that verify specific techniques taught. He notes that early course weeks are intentionally designed to be manageable to build foundational understanding, ensuring students can effectively use AI in more complex scenarios.
  lesson-02-http/01-Web-01-HTTP-01.m4v:
    title: DJ 02.01 Web Applications and the Request/Response Cycle (6:04)
    youtube_id: ZT8uqIEG92o
    kaltura_id: null
    size: 369453093
    md5: 8666d1ecc4b0d43586da418d03519fd9
    duration: 364
    duration_text: 06:04
    description: |
      This lecture details the request-response cycle as the fundamental mechanism for delivering dynamic web content. Understanding this cycle is essential for web developers to effectively build and debug applications, as it reveals the underlying protocol interactions that enable web functionality.

      The cycle begins when a browser sends a request to a web server via a network socket. The server processes the request, potentially accessing data sources, and returns a response containing HTML and other resources. The browser then renders the HTML using CSS and JavaScript to produce the visible web page.
  lesson-02-http/02-Web-01-HTTP-02-Sockets.m4v:
    title: DJ 02.02 Using Sockets to Make Network Connections in Python (6:34)
    youtube_id: RDvlb_XgVyI
    kaltura_id: null
    size: 342378216
    md5: 3c2c565da7264b9f5c95e2f9844a4464
    duration: 394
    duration_text: 06:34
    description: |
      Network sockets provide a communication mechanism for computer applications, modeled after phone calls. This design involves establishing a connection, exchanging data, and disconnecting, which was conceived in the 1960s to handle network communication without requiring permanent connections for scalability.

      Each network connection uses an IP address (IPv4 or IPv6) and a TCP port number. Common ports include 25 for email server communication, 23 for Telnet, 80 for HTTP, and 443 for HTTPS, enabling applications to interact over the internet.
  lesson-02-http/03-Web-01-HTTP-03-HTTP.m4v:
    title: DJ 02.03 Exploring the HyperText Transfer Protocol (16:28)
    youtube_id: Q5YIrYkrVXg
    kaltura_id: null
    size: 868953263
    md5: b1dfc3195151772bf59e708a0f7102c1
    duration: 988
    duration_text: 16:28
    description: |
      The HTTP protocol was invented in 1990 by Tim Berners-Lee and Robert Caillou at CERN to retrieve documents and images. It introduced the URL structure, which combines a protocol (e.g., HTTP, FTP), a host (domain name resolvable to an IP address), and a document path. This design enabled multiple protocols within a single address and became the dominant web protocol after 1990.

      HTTP operates via a request-response mechanism where a client sends a GET request to a server, which responds with a status line (e.g., 200 OK or 404 Not Found) and the requested document. The protocol is defined in open standards (RFCs) maintained by the IETF, ensuring interoperability across diverse systems without proprietary constraints.
  lesson-02-http/04-Web-01-HTTP-04-Browser.m4v:
    title: DJ 02.04 Building a Simple Web Browser in Python (8:39)
    youtube_id: Fxgw_BxZg2I
    kaltura_id: null
    size: 289440817
    md5: 2c3957962f46ab94307b8b241da9bae8
    duration: 519
    duration_text: 08:39
    description: |
      This lecture demonstrates creating a minimal Python client that functions as a browser to send HTTP requests to a server. The client uses socket programming to connect to a specified domain (e.g., data.pr4e.org) on port 80, constructs an HTTP GET request, and receives the server's response.

      The HTTP request string is encoded from Python's Unicode to UTF-8 for transmission, and the server response is decoded from UTF-8 back to Unicode for processing. This example illustrates fundamental network communication concepts but is intentionally minimal; real applications typically require additional error handling and server-side code.
  lesson-02-http/05-Web-01-HTTP-05-Server.m4v:
    title: DJ 02.05 Building a Simple HTTP Server in Python (16:07)
    youtube_id: PNt8zXl7EJ0
    kaltura_id: null
    size: 583612134
    md5: 44bf6e8a5f66c61a3295c63a1f7e122f
    duration: 967
    duration_text: 16:07
    description: |
      The lecture demonstrates building a minimal HTTP web server and client in Python using socket programming. The server listens on port 9000 and returns a static HTML page containing "hello world" for any HTTP GET request. The client connects to the server via a socket and sends a GET request.

      The implementation adheres to HTTP/1.1 (RFC 2616) with UTF-8 encoding for the response body. The server handles connections in an infinite loop using a blocking socket accept call, sending a 200 OK status and text/html content type for each request. The example also shows that browsers automatically request the favicon.ico resource.
  lesson-02-http/06-dev-mode-walkthrough.mov:
    title: DJ 02.06 Understanding Browser Developer Mode (9:43)
    youtube_id: 0JsWY3pmdak
